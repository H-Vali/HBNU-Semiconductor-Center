apiVersion: apps/v1
kind: Deployment
metadata:
  name: hbnu-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hbnu-web
  template:
    metadata:
      labels:
        app: hbnu-web
    spec:
      containers:
        - name: web
          image: ghcr.io/h-vali/hbnu-semiconductor-center-web:latest
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: hbnu-web
spec:
  selector:
    app: hbnu-web
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hbnu-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hbnu-api
  template:
    metadata:
      labels:
        app: hbnu-api
    spec:
      containers:
        - name: api
          image: ghcr.io/h-vali/hbnu-semiconductor-center-api:latest
          ports:
            - containerPort: 4000
          envFrom:
            - secretRef:
                name: hbnu-api-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: hbnu-api
spec:
  selector:
    app: hbnu-api
  ports:
    - port: 4000
      targetPort: 4000
