services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hbnu_center
      POSTGRES_USER: hbnu
      POSTGRES_PASSWORD: hbnu
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgres://hbnu:hbnu@postgres:5432/hbnu_center
      JWT_SECRET: local-dev-secret
      CLIENT_ORIGIN: http://localhost:5173
    ports:
      - "4000:4000"
    depends_on:
      - postgres
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      VITE_API_URL: http://localhost:4000
    ports:
      - "5173:80"
    depends_on:
      - api
volumes:
  postgres-data:
